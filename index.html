<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Turbo Rush - 2D Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
  }
  canvas { display: block; image-rendering: crisp-edges; }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #start-screen, #game-over-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    pointer-events: auto;
  }
  #start-screen {
    background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
  }
  #game-over-screen {
    background: rgba(15, 12, 41, 0.92);
    display: none;
  }
  .title {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: none;
    margin-bottom: 8px;
    animation: titlePulse 2s ease-in-out infinite;
  }
  .subtitle {
    font-size: clamp(14px, 3vw, 22px);
    color: #8888aa;
    margin-bottom: 40px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .btn {
    padding: 14px 48px;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    transition: all 0.3s ease;
    pointer-events: auto;
    margin: 8px;
  }
  .btn-play {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    box-shadow: 0 4px 30px rgba(245, 87, 108, 0.4);
  }
  .btn-play:hover { transform: scale(1.05); box-shadow: 0 6px 40px rgba(245, 87, 108, 0.6); }
  .btn-play:active { transform: scale(0.97); }
  .btn-secondary {
    background: transparent;
    color: #8888aa;
    border: 2px solid #444466;
    font-size: clamp(12px, 2.5vw, 16px);
    padding: 10px 32px;
  }
  .btn-secondary:hover { border-color: #f5576c; color: #f5576c; }
  .game-over-title {
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 900;
    color: #f5576c;
    margin-bottom: 20px;
  }
  .score-display {
    font-size: clamp(20px, 4vw, 36px);
    color: white;
    margin: 6px 0;
  }
  .score-label { color: #8888aa; font-size: clamp(12px, 2.5vw, 18px); letter-spacing: 3px; text-transform: uppercase; }
  .score-value { color: #fda085; font-weight: 700; }
  .car-select {
    display: flex;
    gap: 16px;
    margin: 20px 0;
    flex-wrap: wrap;
    justify-content: center;
  }
  .car-option {
    width: 60px; height: 80px;
    border: 3px solid #444466;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
  }
  .car-option.selected { border-color: #f5576c; box-shadow: 0 0 20px rgba(245, 87, 108, 0.4); }
  .car-option:hover { transform: scale(1.1); }
  .difficulty-select { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; justify-content: center; }
  .diff-btn {
    padding: 8px 20px;
    border: 2px solid #444466;
    border-radius: 20px;
    background: transparent;
    color: #8888aa;
    font-size: clamp(11px, 2vw, 14px);
    cursor: pointer;
    transition: all 0.3s;
    pointer-events: auto;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .diff-btn.selected { border-color: #fda085; color: #fda085; background: rgba(253, 160, 133, 0.1); }
  .controls-hint {
    color: #555577;
    font-size: clamp(10px, 2vw, 13px);
    margin-top: 30px;
    text-align: center;
    line-height: 1.8;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: none;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 15;
    pointer-events: none;
  }
  .hud-left, .hud-right, .hud-center {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .hud-right { align-items: flex-end; }
  .hud-center { align-items: center; position: absolute; left: 50%; transform: translateX(-50%); }
  .hud-text {
    color: white;
    font-size: clamp(11px, 2.2vw, 16px);
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    line-height: 1.5;
  }
  .hud-text span { color: #fda085; }
  .speed-bar-container {
    width: clamp(60px, 12vw, 100px);
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }
  .speed-bar {
    height: 100%;
    background: linear-gradient(90deg, #22cc77, #f5576c);
    border-radius: 3px;
    transition: width 0.1s;
  }
  .lives {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    padding: 6px 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .heart {
    font-size: clamp(15px, 3vw, 21px);
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
  }
  #mobile-controls {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 16px;
    z-index: 15;
    pointer-events: none;
  }
  .ctrl-btn {
    width: clamp(52px, 12vw, 70px);
    height: clamp(52px, 12vw, 70px);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: clamp(18px, 4vw, 26px);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: all 0.1s;
  }
  .ctrl-btn:active, .ctrl-btn.active {
    background: rgba(245, 87, 108, 0.4);
    border-color: #f5576c;
    transform: scale(0.92);
  }
  .ctrl-btn-gas {
    width: clamp(62px, 14vw, 80px);
    height: clamp(62px, 14vw, 80px);
    background: rgba(34, 204, 119, 0.2);
    border-color: rgba(34, 204, 119, 0.5);
  }
  .ctrl-btn-gas:active, .ctrl-btn-gas.active {
    background: rgba(34, 204, 119, 0.5);
  }
  .ctrl-btn-brake {
    background: rgba(245, 87, 108, 0.15);
    border-color: rgba(245, 87, 108, 0.4);
  }
  .ctrl-btn-brake:active, .ctrl-btn-brake.active {
    background: rgba(245, 87, 108, 0.5);
  }
  .pause-btn {
    position: absolute;
    top: 12px; right: 12px;
    width: 48px; height: 48px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(8, 10, 24, 0.35);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    z-index: 16;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .pause-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.34); }
  .pause-btn:active { transform: scale(0.96); }
  .pause-btn.is-paused { background: rgba(245, 87, 108, 0.24); border-color: rgba(245, 87, 108, 0.5); }
  #new-best {
    display: none;
    color: #fda085;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 700;
    animation: titlePulse 1s ease-in-out infinite;
    margin: 10px 0;
  }
  .combo-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 900;
    text-shadow: 0 0 20px rgba(253, 160, 133, 0.8);
    pointer-events: none;
    z-index: 18;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #countdown {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(60px, 14vw, 120px);
    font-weight: 900;
    color: white;
    text-shadow: 0 0 40px rgba(245, 87, 108, 0.8);
    z-index: 18;
    display: none;
    pointer-events: none;
  }
  .track-select { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
  .track-btn {
    padding: 8px 16px;
    border: 2px solid #444466;
    border-radius: 16px;
    background: transparent;
    color: #8888aa;
    font-size: clamp(10px, 1.8vw, 13px);
    cursor: pointer;
    transition: all 0.3s;
    pointer-events: auto;
    letter-spacing: 1px;
  }
  .track-btn.selected { border-color: #f093fb; color: #f093fb; }
  @media (hover: none), (pointer: coarse), (max-width: 768px) {
    #mobile-controls {
      bottom: 12px;
      padding: 0 24px;
      justify-content: space-between;
      align-items: center;
    }
    #hud {
      padding: 8px 12px;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .hud-center {
      position: static;
      left: auto;
      transform: none;
      margin-top: 0;
      align-items: center;
      flex: 1;
    }
    .hud-right {
      align-items: flex-end;
      padding-right: 0;
    }
    .hud-left {
      align-items: flex-start;
      flex: 1;
    }
    .lives { padding: 5px 7px; gap: 4px; }
    .ctrl-btn {
      width: 72px;
      height: 72px;
      font-size: 28px;
    }
    .ctrl-btn-gas {
      width: 84px;
      height: 84px;
    }
  }
  @media (hover: hover) and (pointer: fine) {
    #mobile-controls { display: none !important; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="start-screen">
  <div class="title">Turbo Rush</div>
  <div class="subtitle">Street Racing</div>
  
  <div style="color:#666688;font-size:clamp(11px,2vw,14px);letter-spacing:2px;margin-bottom:12px;">SELECT YOUR RIDE</div>
  <div class="car-select" id="carSelect">
    <div class="car-option selected" data-car="0" data-color="#f5576c">
      <svg width="30" height="50" viewBox="0 0 30 50"><rect x="3" y="5" width="24" height="40" rx="6" fill="#f5576c"/><rect x="6" y="10" width="18" height="10" rx="3" fill="rgba(255,255,255,0.3)"/><rect x="7" y="42" width="6" height="5" rx="2" fill="#333"/><rect x="17" y="42" width="6" height="5" rx="2" fill="#333"/><rect x="7" y="5" width="6" height="5" rx="2" fill="#333"/><rect x="17" y="5" width="6" height="5" rx="2" fill="#333"/></svg>
    </div>
    <div class="car-option" data-car="1" data-color="#22cc77">
      <svg width="30" height="50" viewBox="0 0 30 50"><rect x="4" y="8" width="22" height="36" rx="5" fill="#22cc77"/><rect x="7" y="12" width="16" height="8" rx="3" fill="rgba(255,255,255,0.3)"/><rect x="7" y="40" width="5" height="5" rx="2" fill="#333"/><rect x="18" y="40" width="5" height="5" rx="2" fill="#333"/><rect x="7" y="8" width="5" height="5" rx="2" fill="#333"/><rect x="18" y="8" width="5" height="5" rx="2" fill="#333"/></svg>
    </div>
    <div class="car-option" data-car="2" data-color="#fda085">
      <svg width="30" height="50" viewBox="0 0 30 50"><rect x="2" y="3" width="26" height="44" rx="7" fill="#fda085"/><rect x="6" y="9" width="18" height="10" rx="4" fill="rgba(255,255,255,0.3)"/><rect x="6" y="42" width="6" height="5" rx="2" fill="#333"/><rect x="18" y="42" width="6" height="5" rx="2" fill="#333"/><rect x="6" y="3" width="6" height="5" rx="2" fill="#333"/><rect x="18" y="3" width="6" height="5" rx="2" fill="#333"/></svg>
    </div>
    <div class="car-option" data-car="3" data-color="#7b68ee">
      <svg width="30" height="50" viewBox="0 0 30 50"><rect x="3" y="4" width="24" height="42" rx="4" fill="#7b68ee"/><rect x="6" y="9" width="18" height="9" rx="2" fill="rgba(255,255,255,0.3)"/><rect x="7" y="42" width="5" height="4" rx="2" fill="#333"/><rect x="18" y="42" width="5" height="4" rx="2" fill="#333"/><rect x="7" y="4" width="5" height="4" rx="2" fill="#333"/><rect x="18" y="4" width="5" height="4" rx="2" fill="#333"/></svg>
    </div>
  </div>

  <div style="color:#666688;font-size:clamp(11px,2vw,14px);letter-spacing:2px;margin-bottom:8px;">DIFFICULTY</div>
  <div class="difficulty-select">
    <button class="diff-btn" data-diff="easy">Easy</button>
    <button class="diff-btn selected" data-diff="medium">Medium</button>
    <button class="diff-btn" data-diff="hard">Hard</button>
  </div>

  <div style="color:#666688;font-size:clamp(11px,2vw,14px);letter-spacing:2px;margin:8px 0;">TRACK</div>
  <div class="track-select">
    <button class="track-btn selected" data-track="city">City</button>
    <button class="track-btn" data-track="highway">Highway</button>
    <button class="track-btn" data-track="night">Night</button>
  </div>

  <button class="btn btn-play" id="startBtn">Start Race</button>
  
  <div class="controls-hint">
    🖱️ Arrow Keys / WASD to drive<br>
    📱 Touch controls appear on mobile
  </div>
</div>

<div id="game-over-screen">
  <div class="game-over-title">Wrecked!</div>
  <div id="new-best">🏆 NEW BEST SCORE! 🏆</div>
  <div class="score-label">SCORE</div>
  <div class="score-display score-value" id="finalScore">0</div>
  <div class="score-label" style="margin-top:12px;">DISTANCE</div>
  <div class="score-display" id="finalDistance">0m</div>
  <div class="score-label" style="margin-top:12px;">TOP SPEED</div>
  <div class="score-display" id="finalTopSpeed">0 mph</div>
  <button class="btn btn-play" id="retryBtn" style="margin-top:24px;">Race Again</button>
  <button class="btn btn-secondary" id="menuBtn">Menu</button>
</div>

<div id="hud">
  <div class="hud-left">
    <div class="hud-text">Score: <span id="hudScore">0</span></div>
    <div class="hud-text">Dist: <span id="hudDist">0</span>m</div>
  </div>
  <div class="hud-center">
    <div class="hud-text" style="font-size:clamp(10px,1.8vw,14px);color:#8888aa;">SPEED</div>
    <div class="speed-bar-container"><div class="speed-bar" id="speedBar"></div></div>
    <div class="hud-text"><span id="hudSpeed">0</span> mph</div>
  </div>
  <div class="hud-right">
    <div class="lives" id="hudLives"></div>
    <div class="hud-text">Combo: <span id="hudCombo">x1</span></div>
  </div>
</div>

<div class="combo-display" id="comboPopup"></div>
<div id="countdown"></div>

<button class="pause-btn" id="pauseBtn">⏸</button>

<div id="mobile-controls">
  <button class="ctrl-btn" id="ctrlLeft">◀</button>
  <button class="ctrl-btn" id="ctrlRight">▶</button>
</div>

<script>
// ===== GAME ENGINE =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ===== AUDIO ENGINE (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  switch(type) {
    case 'engine':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80 + Math.random()*20, now);
      osc.frequency.linearRampToValueAtTime(60 + Math.random()*20, now + 0.05);
      gain.gain.setValueAtTime(0.03, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
      break;
    case 'pass':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.linearRampToValueAtTime(784, now + 0.1);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'hit':
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.linearRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      // noise burst
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.15, now);
      ng.gain.linearRampToValueAtTime(0, now + 0.15);
      noise.connect(ng); ng.connect(audioCtx.destination);
      noise.start(now); noise.stop(now + 0.15);
      break;
    case 'boost':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'countdown':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'go':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
      break;
    case 'powerup':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(1200, now + 0.15);
      osc.frequency.linearRampToValueAtTime(600, now + 0.3);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.35);
      osc.start(now); osc.stop(now + 0.35);
      break;
  }
}

// Engine hum loop
let engineInterval = null;
function startEngineSound() {
  stopEngineSound();
  engineInterval = setInterval(() => {
    if (gameState === 'playing' && speed > 1) {
      playSound('engine');
    }
  }, 100);
}
function stopEngineSound() {
  if (engineInterval) clearInterval(engineInterval);
  engineInterval = null;
}

// ===== GAME STATE =====
let gameState = 'menu'; // menu, countdown, playing, paused, gameover
let selectedCar = 0;
let selectedDifficulty = 'medium';
let selectedTrack = 'city';
let bestScore = parseInt(localStorage.getItem('turboRushBest') || '0');

// ===== GAME VARIABLES =====
let W, H;
let roadWidth, laneWidth, numLanes;
let carWidth, carHeight;
let playerX, playerY, playerTargetX;
let speed, maxSpeed, accel, decel, steerSpeed;
let autoAccelRate;
let distance, score, combo, comboTimer;
let lives, maxLives;
let invincibleTimer;
let boostTimer, shieldTimer;
let enemies, powerups, particles, roadLines, buildings;
let shakeTimer, shakeIntensity;
let topSpeed;
let lastTime;
let roadOffset;
let roadCurve;
let curveTimer;
let engineSoundTimer;
let touchLeft, touchRight;

// ===== TRACK THEMES =====
const tracks = {
  city: {
    roadColor: '#333340',
    roadEdge: '#555566',
    grassColor: '#2a4a2a',
    lineColor: '#666677',
    buildingColors: ['#2a2a3a', '#333350', '#2e2e44', '#3a3a55', '#282840'],
    skyColor: '#1a1a2e',
    poleColor: '#556',
    detail: 'buildings'
  },
  highway: {
    roadColor: '#3a3a3a',
    roadEdge: '#666666',
    grassColor: '#3a5a2a',
    lineColor: '#ffffff',
    buildingColors: ['#2a4a2a', '#335533', '#2e4e2e', '#3a6a3a'],

// ===== INIT =====
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  
  roadWidth = Math.min(W * 0.7, 360);
  numLanes = 4;
  laneWidth = roadWidth / numLanes;
  carWidth = laneWidth * 0.6;

  playerY = H - carHeight * 2.5;
  
  if (gameState === 'menu') {
    initMenuBg();

// ===== MENU BACKGROUND =====
let menuBgCars = [];
let menuBgOffset = 0;
function initMenuBg() {
  menuBgCars = [];
  for (let i = 0; i < 6; i++) {
    menuBgCars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 1 + Math.random() * 2,
      color: carColors[Math.floor(Math.random() * 4)],
      w: 20 + Math.random() * 15,
      h: 30 + Math.random() * 20
    });
  }
}

function updateMenuBg(dt) {
  menuBgOffset += 120 * dt;
  menuBgCars.forEach(c => {
    c.y += c.speed * 60 * dt;
    if (c.y > H + 50) { c.y = -50; c.x = Math.random() * W; }
  });
}

function drawMenuBg() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  
  // Road
  const rw = Math.min(W * 0.5, 280);
  const rx = (W - rw) / 2;
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(rx, 0, rw, H);
  
  // Lines
  ctx.setLineDash([30, 20]);
  ctx.strokeStyle = '#444466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2, -(menuBgOffset % 50));
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Background cars
  menuBgCars.forEach(c => {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = c.color;
    roundRect(ctx, c.x - c.w/2, c.y - c.h/2, c.w, c.h, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ===== INPUT =====
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function isLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchLeft; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || touchRight; }

// Touch controls
touchLeft = false; touchRight = false;

function setupTouchBtn(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); val = true; el.classList.add('active'); }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); val = false; el.classList.remove('active'); }, {passive:false});
  el.addEventListener('touchcancel', e => { val = false; el.classList.remove('active'); });
}
// Must use closures for touch state
(function() {
  const state = { left:false, right:false };
  window.touchState = state;
  
  ['ctrlLeft','ctrlRight'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = id === 'ctrlLeft' ? 'left' : 'right';
    el.addEventListener('touchstart', e => { e.preventDefault(); state[key] = true; el.classList.add('active'); }, {passive:false});
    el.addEventListener('touchend', e => { e.preventDefault(); state[key] = false; el.classList.remove('active'); }, {passive:false});
    el.addEventListener('touchcancel', e => { state[key] = false; el.classList.remove('active'); });
    el.addEventListener('mousedown', e => { state[key] = true; el.classList.add('active'); });
    el.addEventListener('mouseup', e => { state[key] = false; el.classList.remove('active'); });
  });
})();

function isLeft() { return keys['ArrowLeft'] || keys['KeyA'] || window.touchState.left; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || window.touchState.right; }

// ===== DIFFICULTY SETTINGS =====

  switch(selectedDifficulty) {
    case 'easy': return { maxSpeed: 550, accel: 280, enemyFreq: 1.8, enemySpeed: 200, enemyCount: 2, powerupFreq: 4 };
    case 'medium': return { maxSpeed: 650, accel: 320, enemyFreq: 1.2, enemySpeed: 250, enemyCount: 3, powerupFreq: 5 };
    case 'hard': return { maxSpeed: 800, accel: 380, enemyFreq: 0.7, enemySpeed: 300, enemyCount: 4, powerupFreq: 7 };
  }
}

  boostTimer = 0;
  shieldTimer = 0;

// ===== SPAWN ENEMIES =====
let enemySpawnTimer = 0;
function spawnEnemy(dt) {
  const ds = getDiffSettings();
  enemySpawnTimer += dt;
  const interval = ds.enemyFreq * (1 - Math.min(distance / 10000, 0.5));
  
  if (enemySpawnTimer >= interval) {
    enemySpawnTimer = 0;
    const lane = Math.floor(Math.random() * numLanes);
    const laneX = getRoadLeft() + lane * laneWidth + laneWidth / 2;
    
    let type = 'normal';
    const r = Math.random();
    if (distance > 500 && r < 0.15) type = 'fast';
    if (distance > 1500 && r < 0.08) type = 'truck';
    if (distance > 3000 && r < 0.05) type = 'wide';
    
    const eColors = ['#4488cc', '#cc8844', '#44cc88', '#cc4488', '#8888cc', '#cc4444'];
    
    enemies.push({
      x: laneX,
      y: -carHeight * 2,
      speed: ds.enemySpeed + Math.random() * 80 - 40,
      type: type,
      color: eColors[Math.floor(Math.random() * eColors.length)],
      w: type === 'truck' ? carWidth * 1.2 : type === 'wide' ? carWidth * 1.3 : carWidth,
      h: type === 'truck' ? carHeight * 1.5 : carHeight,
      passed: false
    });
  }
}

// ===== SPAWN POWERUPS =====
let powerupSpawnTimer = 0;
function spawnPowerup(dt) {
  const ds = getDiffSettings();
  powerupSpawnTimer += dt;
  
  if (powerupSpawnTimer >= ds.powerupFreq) {
    powerupSpawnTimer = 0;
    const lane = Math.floor(Math.random() * numLanes);
    const laneX = getRoadLeft() + lane * laneWidth + laneWidth / 2;
    const types = ['star', 'heart', 'shield'];
    const type = types[Math.floor(Math.random() * types.length)];
    
    powerups.push({
      x: laneX,
      y: -30,
      type: type,
      bob: Math.random() * Math.PI * 2
    });
  }
}

// ===== PARTICLES =====
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 50,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      color: color,
      size: 2 + Math.random() * 4
    });
  }
}

function spawnTrailParticles() {
  if (speed < 50) return;
  const track = tracks[selectedTrack];
  const rl = getRoadLeft();
  // Exhaust particles from player car
  if (Math.random() < 0.3) {
    particles.push({
      x: playerX + (Math.random()-0.5) * carWidth * 0.3,
      y: playerY + carHeight / 2,
      vx: (Math.random()-0.5) * 20,
      vy: 30 + Math.random() * 40,
      life: 0.3 + Math.random() * 0.2,
      maxLife: 0.3 + Math.random() * 0.2,
      color: boostTimer > 0 ? '#fda085' : '#888',
      size: 2 + Math.random() * 3
    });
  }
}

// ===== HELPERS =====
function getRoadLeft() { return (W - roadWidth) / 2; }
function getRoadCenter() { return W / 2; }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCar(x, y, w, h, color, isPlayer, tilt) {
  ctx.save();
  ctx.translate(x, y);
  if (tilt) ctx.rotate(tilt * 0.05);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, -w/2 + 3, -h/2 + 4, w, h, w * 0.15);
  ctx.fill();
  
  // Body
  ctx.fillStyle = color;
  roundRect(ctx, -w/2, -h/2, w, h, w * 0.15);
  ctx.fill();
  
  // Roof / windshield
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  const roofH = h * 0.25;
  roundRect(ctx, -w * 0.35, -h * 0.35, w * 0.7, roofH, 3);
  ctx.fill();
  
  // Rear window
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, -w * 0.3, h * 0.05, w * 0.6, h * 0.18, 2);
  ctx.fill();
  
  // Wheels
  ctx.fillStyle = '#222';
  const ww = w * 0.22, wh = h * 0.15;
  ctx.fillRect(-w/2 - 1, -h * 0.35, ww, wh);
  ctx.fillRect(w/2 - ww + 1, -h * 0.35, ww, wh);
  ctx.fillRect(-w/2 - 1, h * 0.22, ww, wh);
  ctx.fillRect(w/2 - ww + 1, h * 0.22, ww, wh);
  
  // Headlights
  if (isPlayer) {
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(-w * 0.3, -h / 2 - 2, w * 0.2, 4);
    ctx.fillRect(w * 0.1, -h / 2 - 2, w * 0.2, 4);
    
    // Light glow
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#ffee88';
    ctx.beginPath();
    ctx.ellipse(0, -h/2 - 30, w * 0.8, 60, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Taillights
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(-w * 0.3, h / 2 - 3, w * 0.2, 3);
    ctx.fillRect(w * 0.1, h / 2 - 3, w * 0.2, 3);
  }
  
  // Shield effect
  if (isPlayer && shieldTimer > 0) {
    ctx.strokeStyle = `rgba(100, 200, 255, ${0.4 + Math.sin(Date.now()/100)*0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.7, h * 0.6, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  // Invincibility flash
  if (isPlayer && invincibleTimer > 0) {
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 50) * 0.3;
    ctx.fillStyle = 'white';
    roundRect(ctx, -w/2, -h/2, w, h, w * 0.15);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // Boost flames
  if (isPlayer && boostTimer > 0) {
    const flameH = 10 + Math.random() * 15;
    ctx.fillStyle = '#ff6633';
    ctx.beginPath();
    ctx.moveTo(-w * 0.2, h/2);
    ctx.lineTo(0, h/2 + flameH);
    ctx.lineTo(w * 0.2, h/2);
    ctx.fill();
    ctx.fillStyle = '#ffcc33';
    ctx.beginPath();
    ctx.moveTo(-w * 0.1, h/2);
    ctx.lineTo(0, h/2 + flameH * 0.6);
    ctx.lineTo(w * 0.1, h/2);
    ctx.fill();
  }
  
  ctx.restore();
}

// ===== UPDATE =====
function update(dt) {
  if (gameState !== 'playing') return;
  
  // Steering
  let steerDir = 0;
  if (isLeft()) steerDir = -1;
  if (isRight()) steerDir = 1;
  
  // Road curve
  curveTimer += dt;
  if (curveTimer > 4 + Math.random() * 3) {
    curveTimer = 0;
    roadCurve = (Math.random() - 0.5) * 2;
  }
  
  const rl = getRoadLeft();
  const rr = rl + roadWidth;
  
  playerTargetX += steerDir * steerSpeed * dt;
  playerTargetX += roadCurve * 60 * dt;
  playerTargetX = Math.max(rl + carWidth / 2 + 4, Math.min(rr - carWidth / 2 - 4, playerTargetX));
  
  // Smooth movement
  const steerLerp = isMobileDevice() ? 9 : 12;
  playerX += (playerTargetX - playerX) * Math.min(1, dt * steerLerp);
  
  // Auto-acceleration
  autoAccelRate = Math.min(accel, autoAccelRate + accel * 0.08 * dt);
  speed = Math.min(maxSpeed, speed + autoAccelRate * dt);
  
  // Boost
  if (boostTimer > 0) {
    boostTimer -= dt;
    speed = Math.min(speed + accel * 0.8 * dt, maxSpeed * 1.3);
  }
  
  speed = Math.max(0, Math.min(maxSpeed, speed));
  if (speed > topSpeed) topSpeed = speed;
  
  // Distance & score
  const distInc = speed * dt * 0.1;
  distance += distInc;
  score += distInc * combo;
  
  // Combo decay
  comboTimer -= dt;
  if (comboTimer <= 0 && combo > 1) {
    combo = Math.max(1, combo - 1);
    comboTimer = 2;
  }
  
  // Invincibility
  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (shieldTimer > 0) shieldTimer -= dt;
  
  // Road offset for scrolling
  roadOffset += speed * dt;
  
  // Spawn
  spawnEnemy(dt);
  spawnPowerup(dt);
  spawnTrailParticles();
  
  // Engine sound
  engineSoundTimer += dt;
  if (engineSoundTimer > 0.15) {
    engineSoundTimer = 0;
    if (speed > 20) playSound('engine');
  }
  
  // Update road lines
  roadLines.forEach(l => {
    l.y += speed * dt;
    if (l.y > H + 100) l.y -= H + 200;
  });
  
  // Update buildings
  buildings.forEach(b => {
    b.y += speed * dt;
    if (b.y > H + 300) {
      b.y -= H + 500;
      b.leftW = 30 + Math.random() * 80;
      b.leftH = 50 + Math.random() * 120;
      b.rightW = 30 + Math.random() * 80;
      b.rightH = 50 + Math.random() * 120;
      const track = tracks[selectedTrack];
      b.leftColor = track.buildingColors[Math.floor(Math.random() * track.buildingColors.length)];
      b.rightColor = track.buildingColors[Math.floor(Math.random() * track.buildingColors.length)];
    }
  });
  
  // Update enemies
  enemies.forEach(e => {
    e.y += (speed + e.speed) * dt;
    
    // Collision with player
    if (invincibleTimer <= 0) {
      const dx = Math.abs(e.x - playerX);
      const dy = Math.abs(e.y - playerY);
      if (dx < (carWidth + e.w) * 0.4 && dy < (carHeight + e.h) * 0.4) {
        if (shieldTimer > 0) {
          shieldTimer = 0;
          e.y = H + 200;
          spawnParticles(e.x, e.y, '#66ccff', 15, 200);
          playSound('hit');
        } else {
          lives--;
          invincibleTimer = 1.5;
          speed *= 0.4;
          shakeTimer = 0.4;
          shakeIntensity = 10;
          spawnParticles(playerX, playerY, '#ff4444', 20, 200);
          playSound('hit');
          
          if (lives <= 0) {
            gameOver();
            return;
          }
        }
      }
    }
    
    // Check if passed
    if (!e.passed && e.y > playerY + carHeight) {
      e.passed = true;
      score += 50 * combo;
      combo++;
      comboTimer = 3;
      if (combo > 2) {
        showComboPopup(`x${combo} COMBO!`);
      }
      playSound('pass');
      spawnParticles(e.x, e.y, '#ffcc33', 8, 100);
    }
  });
  
  enemies = enemies.filter(e => e.y < H + 200);
  
  // Update powerups
  powerups.forEach(p => {
    p.y += speed * dt;
    p.bob += dt * 5;
    
    const dx = Math.abs(p.x - playerX);
    const dy = Math.abs(p.y - playerY);
    if (dx < carWidth * 0.8 && dy < carHeight * 0.8) {
      switch(p.type) {
        case 'star':
          boostTimer = 3;
          score += 200;
          showComboPopup('⚡ BOOST!');
          break;
        case 'heart':
          if (lives < maxLives) lives++;
          showComboPopup('❤️ +1 LIFE');
          break;
        case 'shield':
          shieldTimer = 5;
          showComboPopup('🛡️ SHIELD');
          break;
      }
      playSound('powerup');
      spawnParticles(p.x, p.y, '#fda085', 15, 150);
      p.y = H + 200;
    }
  });
  powerups = powerups.filter(p => p.y < H + 100);
  
  // Update particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);
  
  // Update shake
  if (shakeTimer > 0) shakeTimer -= dt;
  
  updateHUD();
}

// ===== DRAW =====
function draw() {
  ctx.save();
  
  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 0.4);
    const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 0.4);
    ctx.translate(sx, sy);
  }
  
  const track = tracks[selectedTrack];
  const rl = getRoadLeft();
  const rr = rl + roadWidth;
  
  // Background
  ctx.fillStyle = track.skyColor;
  ctx.fillRect(0, 0, W, H);
  
  // Grass
  ctx.fillStyle = track.grassColor;
  ctx.fillRect(0, 0, rl, H);
  ctx.fillRect(rr, 0, W - rr, H);
  
  // Road
  ctx.fillStyle = track.roadColor;
  ctx.fillRect(rl, 0, roadWidth, H);
  
  // Road edges
  ctx.fillStyle = track.roadEdge;
  ctx.fillRect(rl - 3, 0, 3, H);
  ctx.fillRect(rr, 0, 3, H);
  
  // Buildings / scenery
  buildings.forEach(b => {
    // Left side
    ctx.fillStyle = b.leftColor;
    const bx = rl - b.leftW - 10;
    const by = b.y - b.leftH;
    ctx.fillRect(bx, by, b.leftW, b.leftH);
    
    // Windows
    if (selectedTrack === 'night' || selectedTrack === 'city') {
      for (let wy = by + 8; wy < by + b.leftH - 8; wy += 14) {
        for (let wx = bx + 6; wx < bx + b.leftW - 6; wx += 12) {
          ctx.fillStyle = Math.random() > 0.3 ? 'rgba(255,230,150,0.6)' : 'rgba(255,230,150,0.1)';
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    }
    
    // Right side
    ctx.fillStyle = b.rightColor;
    const rbx = rr + 10;
    const rby = b.y - b.rightH;
    ctx.fillRect(rbx, rby, b.rightW, b.rightH);
    
    if (selectedTrack === 'night' || selectedTrack === 'city') {
      for (let wy = rby + 8; wy < rby + b.rightH - 8; wy += 14) {
        for (let wx = rbx + 6; wx < rbx + b.rightW - 6; wx += 12) {
          ctx.fillStyle = Math.random() > 0.3 ? 'rgba(255,230,150,0.6)' : 'rgba(255,230,150,0.15)';
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    }
  });
  
  // Street lights (highway/night)
  if (selectedTrack !== 'city') {
    const lightSpacing = 200;
    const lightY = (roadOffset % lightSpacing);
    for (let y = -lightSpacing + lightY; y < H + lightSpacing; y += lightSpacing) {
      // Left pole
      ctx.fillStyle = track.poleColor;
      ctx.fillRect(rl - 8, y - 60, 3, 60);
      ctx.fillRect(rl - 20, y - 62, 20, 3);
      // Light
      if (selectedTrack === 'night') {
        ctx.fillStyle = 'rgba(255,230,150,0.3)';
        ctx.beginPath();
        ctx.arc(rl - 18, y - 62, 15, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffee88';
      ctx.beginPath();
      ctx.arc(rl - 18, y - 63, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Right pole
      ctx.fillStyle = track.poleColor;
      ctx.fillRect(rr + 5, y - 60, 3, 60);
      ctx.fillRect(rr + 3, y - 62, 20, 3);
      if (selectedTrack === 'night') {
        ctx.fillStyle = 'rgba(255,230,150,0.3)';
        ctx.beginPath();
        ctx.arc(rr + 21, y - 62, 15, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffee88';
      ctx.beginPath();
      ctx.arc(rr + 21, y - 63, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // Lane markings
  ctx.setLineDash([30, 25]);
  ctx.strokeStyle = track.lineColor;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  for (let lane = 1; lane < numLanes; lane++) {
    const lx = rl + lane * laneWidth;
    ctx.beginPath();
    const dashOffset = (roadOffset * 2) % 55;
    ctx.lineDashOffset = -dashOffset;
    ctx.moveTo(lx, -50);
    ctx.lineTo(lx, H + 50);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
  
  // Dashed center line
  if (selectedTrack === 'highway') {
    ctx.strokeStyle = '#ffcc33';
    ctx.lineWidth = 2;
    ctx.setLineDash([40, 20]);
    ctx.lineDashOffset = -(roadOffset * 2) % 60;
    ctx.beginPath();
    ctx.moveTo(W/2, -50);
    ctx.lineTo(W/2, H + 50);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Powerups
  powerups.forEach(p => {
    const bobY = Math.sin(p.bob) * 3;
    ctx.save();
    ctx.translate(p.x, p.y + bobY);
    
    // Glow
    const glowColor = p.type === 'star' ? 'rgba(255,220,50,0.3)' : p.type === 'heart' ? 'rgba(255,80,80,0.3)' : 'rgba(100,200,255,0.3)';
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'star' ? '⚡' : p.type === 'heart' ? '❤️' : '🛡️', 0, 0);
    ctx.restore();
  });
  
  // Enemies
  enemies.forEach(e => {
    drawCar(e.x, e.y, e.w, e.h, e.color, false, 0);
  });
  
  // Player
  const tilt = (playerTargetX - playerX) * 0.01;
  drawCar(playerX, playerY, carWidth, carHeight, carColors[selectedCar], true, steerDir || 0);
  
  // Boost effect on road
  if (boostTimer > 0) {
    ctx.fillStyle = `rgba(253, 160, 133, ${0.1 + Math.sin(Date.now()/100) * 0.05})`;
    ctx.fillRect(rl, 0, roadWidth, H);
  }
  
  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  
  // Night overlay for night track
  if (selectedTrack === 'night') {
    // Darkness gradient from player car
    const gradient = ctx.createRadialGradient(playerX, playerY - 30, 50, playerX, playerY - 30, H * 0.7);
    gradient.addColorStop(0, 'rgba(5,5,16,0)');
    gradient.addColorStop(0.6, 'rgba(5,5,16,0.3)');
    gradient.addColorStop(1, 'rgba(5,5,16,0.7)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
  }
  
  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  ctx.restore();
}

// ===== HUD UPDATE =====
function updateHUD() {
  document.getElementById('hudScore').textContent = Math.floor(score);
  document.getElementById('hudDist').textContent = Math.floor(distance);
  document.getElementById('hudSpeed').textContent = Math.floor(speed * 0.6);
  document.getElementById('hudCombo').textContent = `x${combo}`;
  
  const speedPct = Math.min(100, (speed / maxSpeed) * 100);
  document.getElementById('speedBar').style.width = speedPct + '%';
  
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '<span class="heart">❤️</span>';
  for (let i = lives; i < maxLives; i++) hearts += '<span class="heart" style="opacity:0.2">❤️</span>';
  document.getElementById('hudLives').innerHTML = hearts;
}

// ===== COMBO POPUP =====
function showComboPopup(text) {
  const el = document.getElementById('comboPopup');
  el.textContent = text;
  el.style.opacity = 1;
  el.style.transform = 'translate(-50%, -50%) scale(1.2)';
  setTimeout(() => {
    el.style.opacity = 0;
    el.style.transform = 'translate(-50%, -50%) scale(0.8)';
  }, 800);
}

// ===== GAME OVER =====
function gameOver() {
  gameState = 'gameover';
  stopEngineSound();
  
  const finalScore = Math.floor(score);
  const isNewBest = finalScore > bestScore;
  if (isNewBest) {
    bestScore = finalScore;
    localStorage.setItem('turboRushBest', bestScore);
  }
  
  document.getElementById('finalScore').textContent = finalScore;
  document.getElementById('finalDistance').textContent = Math.floor(distance) + 'm';
  document.getElementById('finalTopSpeed').textContent = Math.floor(topSpeed * 0.6) + ' mph';
  document.getElementById('new-best').style.display = isNewBest ? 'block' : 'none';
  
  document.getElementById('hud').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'flex';
}

// ===== COUNTDOWN =====
function startCountdown() {
  gameState = 'countdown';
  const cdEl = document.getElementById('countdown');
  cdEl.style.display = 'block';
  
  let count = 3;
  cdEl.textContent = count;
  playSound('countdown');
  
  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      cdEl.textContent = count;
      playSound('countdown');
    } else if (count === 0) {
      cdEl.textContent = 'GO!';
      cdEl.style.color = '#22cc77';
      playSound('go');
    } else {
      clearInterval(interval);
      cdEl.style.display = 'none';
      cdEl.style.color = 'white';
      gameState = 'playing';
      startEngineSound();
    }
  }, 800);
}

// ===== START GAME =====
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  setPauseButtonState(false);
  setPauseControlsVisible(true);
  
  // Show mobile controls on touch devices
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('mobile-controls').style.display = 'flex';
  }
  
  initGame();
  startCountdown();
}

// ===== STEER DIR VARIABLE =====
let steerDir = 0;

// ===== GAME LOOP =====
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  
  resize();
  
  if (gameState === 'menu') {
    updateMenuBg(dt);
    drawMenuBg();
  } else if (gameState === 'countdown' || gameState === 'playing') {
    if (gameState === 'playing') {
      steerDir = isLeft() ? -1 : isRight() ? 1 : 0;
      update(dt);
    }
    draw();
  } else if (gameState === 'gameover') {
    draw();
  }
  
  requestAnimationFrame(gameLoop);
}

// ===== UI EVENT LISTENERS =====
const pauseButtons = [document.getElementById('pauseBtn')].filter(Boolean);

function setPauseButtonState(isPaused) {
  pauseButtons.forEach(button => {
    button.textContent = isPaused ? '▶' : '⏸';
    button.classList.toggle('is-paused', isPaused);
  });
}

function setPauseControlsVisible(visible) {
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const desktopPause = document.getElementById('pauseBtn');

  if (desktopPause) {
    desktopPause.style.display = visible && !isTouchDevice ? 'flex' : 'none';
  }
}

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  startGame();
});

document.getElementById('retryBtn').addEventListener('click', () => {
  startGame();
});

document.getElementById('menuBtn').addEventListener('click', () => {
  gameState = 'menu';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  setPauseControlsVisible(false);
  setPauseButtonState(false);
  document.getElementById('mobile-controls').style.display = 'none';
});

pauseButtons.forEach(button => button.addEventListener('click', () => {
  if (gameState === 'playing') {
    gameState = 'paused';
    setPauseButtonState(true);
    stopEngineSound();
  } else if (gameState === 'paused') {
    gameState = 'playing';
    setPauseButtonState(false);
    startEngineSound();
    lastTime = performance.now();
  }
}));

// Car selection
document.querySelectorAll('.car-option').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.car-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedCar = parseInt(el.dataset.car);
  });
});

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedDifficulty = el.dataset.diff;
  });
});

// Track selection
document.querySelectorAll('.track-btn').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.track-btn').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedTrack = el.dataset.track;
  });
});

// ===== INIT =====
window.addEventListener('resize', resize);
resize();
initMenuBg();
requestAnimationFrame(gameLoop);
</script>
</body>
